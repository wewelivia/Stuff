<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>House View — Monitor Hub</title>
<style>
:root{--bg:#f5f6f8;--panel:#fff;--ink:#1a1d24;--muted:#69707d;--line:#e3e6ea;--accent:#00aeef;--up:#0e8a4a;--down:#c0392b}
[data-theme="dark"]{--bg:#0f1216;--panel:#171b21;--ink:#e8eaee;--muted:#8b93a1;--line:#262c35;--up:#3ecf8e;--down:#ef6a5a}
*{box-sizing:border-box}
body{margin:0;font:15px/1.5 -apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink)}
header{display:flex;align-items:center;gap:14px;padding:16px 26px;border-bottom:1px solid var(--line);background:var(--panel)}
h1{font-size:18px;margin:0;font-weight:650}
.spacer{flex:1}
button,input{font:inherit;color:var(--ink);background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:6px 12px}
button{cursor:pointer;background:transparent}
button:hover{border-color:var(--accent)}
main{max-width:860px;margin:40px auto;padding:0 24px}
.hostrow{display:flex;gap:10px;align-items:center;margin-bottom:26px;color:var(--muted);font-size:13px}
.hostrow input{width:220px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px;display:flex;flex-direction:column;gap:8px}
.card h2{margin:0;font-size:16px}
.card .desc{color:var(--muted);font-size:13px;flex:1}
.status{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted)}
.dot{width:10px;height:10px;border-radius:50%;background:var(--muted)}
.dot.ok{background:var(--up)}.dot.down{background:var(--down)}
.open{display:inline-block;text-align:center;text-decoration:none;color:var(--accent);border:1px solid var(--accent);border-radius:8px;padding:7px 0;font-weight:600}
.open:hover{background:var(--accent);color:#fff}
.hint{margin-top:30px;color:var(--muted);font-size:13px}
code{background:var(--panel);border:1px solid var(--line);border-radius:5px;padding:1px 6px;font-size:12px}
</style>
</head>
<body>
<header>
  <h1>Monitor Hub</h1>
  <span class="spacer"></span>
  <button id="theme">◐</button>
</header>
<main>
  <div class="hostrow">
    Backend host: <input id="host" placeholder="127.0.0.1">
    <button id="savehost">Save</button>
    <span>ports come from monitors.yaml · status refreshes every 5s</span>
  </div>
  <div class="cards" id="cards"></div>
  <p class="hint">Start everything with <code>python run_all.py</code> (or <code>start_all.bat</code> on Windows).
  Edit the <code>MONITORS</code> list at the top of this file's script to adjust names, ports or dashboard paths.</p>
</main>
<script>
// ---- edit to match monitors.yaml ---------------------------------------
// Two kinds of dashboard:
//   html: 'path/to/file.html'  -> standalone HTML opened from disk
//                                 (View Challenges, Market Monitor)
//   served: true               -> frontend served BY the backend itself;
//                                 the link becomes http://<host>:<port>/
//                                 (use this when opening the file directly
//                                 loses all CSS/JS formatting)
//   path: '/page.html'         -> optional, with served: deep-link to a
//                                 specific page instead of the root
const MONITORS=[
  {name:'View Challenges', desc:'Economic releases scored against the house view — challenge, confirm or neutral across six themes.', port:8000, served:true},
  {name:'Market Monitor', desc:'Growth/inflation regime quadrant, correlation shifts and vol-adjusted cross-asset moves over 1d, 1w, 1m and 3m — every move in standard deviations.', port:8010, html:'../MarketMonitor/market-monitor.html'},
  {name:'Option Implied', desc:'Option-implied market monitor.', port:8020, served:true},
];
// -----------------------------------------------------------------------
const LSK_HOST='hv-hub-host', LSK_THEME='hv-theme';
const host=()=>localStorage.getItem(LSK_HOST)||'127.0.0.1';

document.documentElement.dataset.theme=localStorage.getItem(LSK_THEME)||
  (matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');
document.getElementById('theme').onclick=()=>{
  const t=document.documentElement.dataset.theme==='dark'?'light':'dark';
  document.documentElement.dataset.theme=t;localStorage.setItem(LSK_THEME,t);
};
document.getElementById('host').value=host();
document.getElementById('savehost').onclick=()=>{
  localStorage.setItem(LSK_HOST,document.getElementById('host').value.trim()||'127.0.0.1');
  setLinks();ping();
};

document.getElementById('cards').innerHTML=MONITORS.map((m,i)=>`
  <div class="card">
    <h2>${m.name}</h2>
    <div class="desc">${m.desc}</div>
    <div class="status"><span class="dot" id="dot${i}"></span><span id="st${i}">checking…</span></div>
    <a class="open" id="open${i}" href="${m.served?'#':m.html}">Open dashboard</a>
  </div>`).join('');

function setLinks(){
  MONITORS.forEach((m,i)=>{
    if(m.served)document.getElementById('open'+i).href=`http://${host()}:${m.port}${m.path||'/'}`;
  });
}
setLinks();

async function ping(){
  await Promise.all(MONITORS.map(async(m,i)=>{
    const dot=document.getElementById('dot'+i), st=document.getElementById('st'+i);
    const base=`http://${host()}:${m.port}`;
    try{
      const ctl=new AbortController(); setTimeout(()=>ctl.abort(),3000);
      const r=await fetch(base+'/openapi.json',{signal:ctl.signal});
      if(r.ok){dot.className='dot ok';st.textContent='running on :'+m.port;return;}
      throw new Error(r.status);
    }catch(e){
      // openapi.json unavailable or CORS-blocked from file:// — fall back to a
      // no-cors probe: response is unreadable, but completing proves the
      // server is reachable.
      try{
        const ctl2=new AbortController(); setTimeout(()=>ctl2.abort(),3000);
        await fetch(base+'/',{mode:'no-cors',signal:ctl2.signal});
        dot.className='dot ok';st.textContent='running on :'+m.port;
      }catch(e2){dot.className='dot down';st.textContent='offline (:'+m.port+')';}
    }
  }));
}
ping(); setInterval(ping,5000);
</script>
</body>
</html>
