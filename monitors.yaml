# MonitorHub configuration
# ------------------------
# One entry per dashboard backend. Place the MonitorHub folder NEXT TO your
# three project folders and adjust `dir` paths (relative to this file, or
# absolute — Windows paths like C:\Dashboards\HouseView work too).
#
#   name : label used in log prefixes and the hub page
#   dir  : working directory of that project (where its app module lives)
#   app  : ASGI app in uvicorn notation, module:attribute
#   port : port for this backend (must all differ)
#
# Optional per monitor:
#   host    : bind address (default 0.0.0.0 so the Mac can reach the Windows box)
#   command : full custom command overriding uvicorn, as a list

host: 0.0.0.0

monitors:
  - name: view-challenges          # economic data vs house view
    dir: ../HouseView
    app: app:app
    port: 8000

  - name: market-monitor           # macro regime / outsized moves
    dir: ../MarketMonitor
    app: market_monitor_api:app
    port: 8010

  - name: option-implied           # option-implied monitor
    dir: ../OptionImplied          # <- adjust to your folder name
    app: app:app                   # <- adjust if its module is named differently
    port: 8020
